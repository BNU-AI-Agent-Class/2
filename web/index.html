<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雪峰老师</title>
<style>
:root {
  --bg: #fdfcfa;
  --surface: #ffffff;
  --text: #2c2c2a;
  --text-muted: #888780;
  --border: #e8e6dd;
  --blue: #378add;
  --blue-light: #e6f1fb;
  --coral: #d85a30;
  --coral-light: #faece7;
  --green: #639922;
  --green-light: #eaf3de;
  --amber: #ba7517;
  --amber-light: #faeeda;
  --red: #e24b4a;
  --red-light: #fcebeb;
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  height: 100vh;
  display: flex;
  background: url('bg.png') center/cover no-repeat fixed;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}

/* 背景遮罩 */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(253, 252, 250, 0.88);
  z-index: -1;
}

/* ── 侧边栏 ─────────────────────────────────────────── */
.sidebar {
  flex: 0 0 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}
.sidebar img {
  max-width: 100%;
  max-height: 80vh;
  object-fit: contain;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  opacity: 0.9;
}

/* ── 主内容区 ───────────────────────────────────────── */
.main {
  flex: 1;
  max-width: 720px;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  box-shadow: 0 0 40px rgba(0,0,0,0.06);
  position: relative;
  z-index: 1;
}

@media (max-width: 1024px) {
  .sidebar { display: none; }
  .main { max-width: 100%; border: none; }
}

/* ── Header ─────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.header-left { display: flex; align-items: center; gap: 10px; }

.header-title {
  font-size: 15px;
  font-weight: 500;
}

.header-subtitle {
  font-size: 12px;
  color: var(--text-muted);
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 4px;
}
.status-dot.green { background: var(--green); }
.status-dot.yellow { background: var(--amber); }
.status-dot.red { background: var(--red); }

.btn {
  border: 1px solid var(--border);
  background: var(--surface);
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 12px;
  color: var(--text-muted);
  transition: all 0.15s;
}
.btn:hover { border-color: #b4b2a9; color: var(--text); }
.btn-crisis { color: var(--red); border-color: var(--red); }
.btn-crisis:hover { background: var(--red-light); border-color: var(--red); }
.btn-sm { font-size: 11px; padding: 4px 8px; }

/* ── Crisis bar ─────────────────────────────────────── */
.crisis-bar {
  background: var(--red-light);
  border-bottom: 1px solid var(--red);
  padding: 6px 20px;
  flex-shrink: 0;
}
.crisis-bar-inner {
  max-width: 640px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: #791f1f;
  flex-wrap: wrap;
}

/* ── Chat area ──────────────────────────────────────── */
.chat-wrapper {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scroll-behavior: smooth;
}

.chat-inner {
  max-width: 640px;
  margin: 0 auto;
}

.message {
  margin-bottom: 16px;
  display: flex;
  gap: 10px;
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.message.user { flex-direction: row-reverse; }

.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  overflow: hidden;
}
.avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.message.assistant .avatar { background: var(--blue-light); }
.message.user .avatar { background: var(--coral-light); }

.bubble {
  max-width: 82%;
  padding: 12px 16px;
  border-radius: var(--radius);
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
}
.message.assistant .bubble {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-top-left-radius: 4px;
}
.message.user .bubble {
  background: var(--blue-light);
  border-top-right-radius: 4px;
}

/* ── Special cards ──────────────────────────────────── */
.card {
  margin: 12px 0;
  border-radius: var(--radius);
  padding: 16px;
  border: 0.5px solid var(--border);
  animation: fadeIn 0.3s ease;
}

.card-list {
  background: var(--green-light);
  border-color: #c0dd97;
}
.card-list h3 {
  font-size: 13px; font-weight: 500;
  margin-bottom: 8px;
  color: #3b6d11;
}
.card-list ul {
  list-style: none;
  padding: 0;
}
.card-list li {
  padding: 4px 0 4px 18px;
  position: relative;
  font-size: 13px;
}
.card-list li::before {
  content: "";
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 6px; height: 6px; border-radius: 50%;
}
.card-list li.accept::before { background: var(--green); }
.card-list li.maybe::before { background: var(--amber); }
.card-list li.reject::before { background: var(--red); }

.card-script {
  background: var(--amber-light);
  border-color: #fac775;
}
.card-script h3 {
  font-size: 13px; font-weight: 500;
  margin-bottom: 8px;
  color: #854f0b;
}
.card-script .script-text {
  font-style: italic;
  padding: 10px 14px;
  background: rgba(255,255,255,0.6);
  border-radius: var(--radius-sm);
  font-size: 13px;
  line-height: 1.7;
}
.card-script .copy-btn {
  margin-top: 8px;
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  border: 1px solid var(--amber);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--amber);
}
.card-script .copy-btn:hover { background: var(--amber); color: #fff; }

/* ── Safety banner ──────────────────────────────────── */
.safety-banner {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  margin-top: 4px;
  display: flex; align-items: center; gap: 6px;
}
.safety-banner.yellow { background: var(--amber-light); color: #854f0b; }
.safety-banner.red { background: var(--red-light); color: #791f1f; }

/* ── Input area ─────────────────────────────────────── */
.input-area {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  flex-shrink: 0;
}

.input-inner {
  max-width: 640px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
}

textarea {
  flex: 1;
  resize: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 14px;
  font-family: inherit;
  line-height: 1.5;
  outline: none;
  max-height: 100px;
  min-height: 42px;
  transition: border-color 0.15s;
}
textarea:focus { border-color: var(--blue); }

.send-btn {
  width: 42px; height: 42px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  flex-shrink: 0;
  transition: opacity 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.send-btn:hover { opacity: 0.85; }
.send-btn:disabled { opacity: 0.4; cursor: default; }

/* ── Typing indicator ───────────────────────────────── */
.typing { padding: 8px 16px; color: var(--text-muted); font-size: 12px; }

/* ── Empty state ────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
.empty-state p { font-size: 13px; line-height: 1.8; }
</style>
</head>
<body>

<!-- ═══ 左侧边栏 ════════════════════════════════════════════════ -->
<div class="sidebar left">
  <img src="side.png" alt="雪峰老师">
</div>

<!-- ═══ 主内容区 ═══════════════════════════════════════════════════ -->
<div class="main">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="avatar" style="background:#e6f1fb;"><img src="avatar.png" alt="雪峰老师"></div>
      <div>
        <div class="header-title">雪峰老师</div>
        <div class="header-subtitle">张雪峰老师陪你理清志愿底线</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn btn-crisis" onclick="toggleCrisisInfo()" title="需要帮助？">🛑 求助</button>
      <button class="btn" onclick="resetChat()">新对话</button>
    </div>
  </div>

  <!-- Crisis bar -->
  <div id="crisisBar" class="crisis-bar" style="display:none;">
    <div class="crisis-bar-inner">
      <strong>24小时心理援助热线：</strong>
      北京 010-82951332 | 全国 12355 | 紧急 120
      <button class="btn btn-sm" onclick="toggleCrisisInfo()" style="margin-left:auto;">收起</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-wrapper" id="chatWrapper">
    <div class="chat-inner" id="chatInner">

      <div class="empty-state" id="emptyState">
        <h2>嗨，我是雪峰老师</h2>
        <p>
          我不替你做决定。<br>
          我帮你把「不知道喜欢什么」<br>
          变成清楚的底线和温和的表达。<br><br>
          <span style="color:var(--text-muted);font-size:12px;">
            我是 AI 助手，不能替代专业心理咨询或升学规划。<br>
            如果你感到困扰或不安，请点击右上角「求助」查看热线。
          </span><br><br>
          聊聊你的志愿，我在听。
        </p>
      </div>

    </div>
  </div>

  <!-- Safety banner -->
  <div id="safetyContainer" style="max-width:640px;margin:0 auto;padding:0 20px;"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-inner">
      <textarea id="userInput" placeholder="说说你的想法..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
  </div>

  <!-- Footer -->
  <div style="text-align:center;padding:8px;font-size:11px;color:var(--text-muted);border-top:0.5px solid var(--border);flex-shrink:0;">
    我们不会采集或存储你的真实身份信息 | 对话记录仅保存在你的浏览器会话中
  </div>
</div>

<!-- ═══ 右侧边栏 ════════════════════════════════════════════════ -->
<div class="sidebar right">
  <img src="side.png" alt="雪峰老师">
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════════════════════════
let sessionId = "";
let isWaiting = false;

async function initSession() {
  const r = await fetch("/api/session/new");
  const d = await r.json();
  sessionId = d.session_id;
}
initSession();

// ═══════════════════════════════════════════════════════════════
// 发送消息
// ═══════════════════════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById("userInput");
  const msg = input.value.trim();
  if (!msg || isWaiting || !sessionId) return;
  isWaiting = true;
  input.value = "";
  document.getElementById("sendBtn").disabled = true;
  autoResize();

  // 隐藏空状态
  const es = document.getElementById("emptyState");
  if (es) es.style.display = "none";

  // 显示用户消息
  const chat = document.getElementById("chatInner");
  chat.insertAdjacentHTML("beforeend", buildMessage("user", escapeHtml(msg)));
  scrollBottom();

  // 显示打字中
  const typingEl = document.createElement("div");
  typingEl.className = "typing";
  typingEl.id = "typing";
  typingEl.textContent = "雪峰老师正在思考...";
  chat.appendChild(typingEl);
  scrollBottom();

  try {
    const r = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Session-Id": sessionId },
      body: JSON.stringify({ message: msg }),
    });
    const d = await r.json();

    // 移除打字中
    typingEl.remove();

    // 显示助手回复
    let html = buildMessage("assistant", escapeHtml(d.reply || ""));

    // 安全灯指示
    if (d.safety === "yellow") {
      html += `<div class="safety-banner yellow">⚠ 情绪关注模式 — 放慢节奏，先确认感受</div>`;
    }
    if (d.safety === "red") {
      html += `<div class="safety-banner red">🛑 已触发安全转介 — 请查看上方热线信息</div>`;
    }

    // 底线清单卡片
    if (d.summary) {
      html += buildSummaryCard(d.summary);
    }

    // 沟通话术卡片
    if (d.script) {
      html += buildScriptCard(d.script);
    }

    chat.insertAdjacentHTML("beforeend", html);

    // 阶段指示
    updateStageBadge(d.stage);

    scrollBottom();
  } catch (e) {
    typingEl.remove();
    chat.insertAdjacentHTML("beforeend", buildMessage(
      "assistant", "抱歉，连接出了点问题。请确认后端服务已启动，然后刷新页面重试。"
    ));
  }
  isWaiting = false;
  document.getElementById("sendBtn").disabled = false;
  document.getElementById("userInput").focus();
}

// ═══════════════════════════════════════════════════════════════
// 构建消息 HTML
// ═══════════════════════════════════════════════════════════════
function buildMessage(role, text) {
  const ava = role === "user"
    ? "👤"
    : '<img src="avatar.png" alt="雪峰老师">';
  return `<div class="message ${role}">
    <div class="avatar">${ava}</div>
    <div class="bubble">${text}</div>
  </div>`;
}

function buildSummaryCard(s) {
  let html = '<div class="card card-list"><h3>你的志愿底线清单</h3>';
  if (s["绝对不接受"] && s["绝对不接受"].length) {
    html += '<div style="margin-bottom:8px"><strong>绝对不能接受：</strong><ul>';
    s["绝对不接受"].forEach(x => { html += `<li class="reject">${escapeHtml(x)}</li>`; });
    html += '</ul></div>';
  }
  if (s["可商量"] && s["可商量"].length) {
    html += '<div style="margin-bottom:8px"><strong>可商量：</strong><ul>';
    s["可商量"].forEach(x => { html += `<li class="maybe">${escapeHtml(x)}</li>`; });
    html += '</ul></div>';
  }
  if (s["完全接受"] && s["完全接受"].length) {
    html += '<div><strong>完全接受：</strong><ul>';
    s["完全接受"].forEach(x => { html += `<li class="accept">${escapeHtml(x)}</li>`; });
    html += '</ul></div>';
  }
  if (s["愿意承受的风险"] && s["愿意承受的风险"].length) {
    html += '<div style="margin-top:8px"><strong>愿意承受的风险：</strong><ul>';
    s["愿意承受的风险"].forEach(x => { html += `<li class="maybe">${escapeHtml(x)}</li>`; });
    html += '</ul></div>';
  }
  html += '</div>';
  return html;
}

function buildScriptCard(script) {
  return `<div class="card card-script">
    <h3>你可以这样跟家人说</h3>
    <div class="script-text">${escapeHtml(script)}</div>
    <button class="copy-btn" onclick="copyScript(this)">复制话术</button>
  </div>`;
}

function updateStageBadge(stage) {
  const map = {
    opening: "👋 开场",
    clarify: "🔍 澄清中",
    confirm: "📋 确认清单",
    script: "💬 生成话术",
    closing: "👋 收尾",
    crisis: "🛑 安全模式",
  };
  const label = map[stage] || stage;
  const sub = document.querySelector(".header-subtitle");
  if (sub) sub.textContent = `当前阶段：${label}`;
}

function copyScript(btn) {
  const text = btn.parentElement.querySelector(".script-text").textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "已复制";
    setTimeout(() => { btn.textContent = "复制话术"; }, 1500);
  });
}

// ═══════════════════════════════════════════════════════════════
// 工具函数
// ═══════════════════════════════════════════════════════════════
function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function scrollBottom() {
  const w = document.getElementById("chatWrapper");
  setTimeout(() => { w.scrollTop = w.scrollHeight; }, 50);
}

function autoResize() {
  const t = document.getElementById("userInput");
  t.style.height = "auto";
  t.style.height = Math.min(t.scrollHeight, 100) + "px";
}

async function resetChat() {
  const chat = document.getElementById("chatInner");
  chat.innerHTML = `<div class="empty-state" id="emptyState">
    <h2>新对话已开始</h2>
    <p>聊聊你的志愿，我在听。</p>
  </div>`;
  document.getElementById("safetyContainer").innerHTML = "";
  document.querySelector(".header-subtitle").textContent = "张雪峰老师陪你理清志愿底线";
  await initSession();
}

document.getElementById("userInput").addEventListener("input", autoResize);

function toggleCrisisInfo() {
  const bar = document.getElementById("crisisBar");
  bar.style.display = bar.style.display === "none" ? "block" : "none";
}
</script>
</body>
</html>
